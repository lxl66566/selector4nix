name: System Test

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Discover System Tests
        id: matrix
        run: |
          system="$(nix eval --impure --expr 'builtins.currentSystem' --raw)"
          tests="$(nix eval ".#packages.${system}.selector4nix.passthru.tests" \
            --apply builtins.attrNames --json)"

          matrix="$(echo "$tests" | jq -c '[
            [., ["ubuntu-latest", "macos-latest"]]
            | combinations
            | . as [$test, $os]
            | {test: $test, os: $os}
          ]')"
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  test:
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Build selector4nix
        run: |
          system="$(nix eval --impure --expr 'builtins.currentSystem' --raw)"
          nix build ".#packages.${system}.selector4nix" -L --no-link --print-out-paths

      - name: Build passthru.tests.${{ matrix.test }}
        run: |
          system="$(nix eval --impure --expr 'builtins.currentSystem' --raw)"
          nix build ".#packages.${system}.selector4nix.passthru.tests.${{ matrix.test }}" \
            -L --no-link --print-out-paths | tee /tmp/test-path

      - name: Run passthru.tests.${{ matrix.test }}
        run: |
          store_path="$(cat /tmp/test-path)"
          bin="$(ls "$store_path/bin" | head -1)"
          if [ -z "$bin" ]; then
            echo "::error::no executable found in ${store_path}/bin"
            exit 1
          fi
          "$store_path/bin/$bin"
