<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>selector4nix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f1117;
      --border: #2a2d3a;
      --text: #c9d1d9;
      --text-dim: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --font-sans: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    main {
      text-align: center;
      padding: 2rem 1.5rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #fff;
      margin-bottom: 0.4rem;
    }

    h1 span {
      color: var(--accent);
    }

    p {
      color: var(--text-dim);
      font-size: 0.95rem;
      margin-bottom: 1.25rem;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.75rem;
      background: rgba(63, 185, 80, 0.08);
      border: 1px solid rgba(63, 185, 80, 0.2);
      border-radius: 999px;
      font-size: 0.8rem;
      color: var(--green);
      margin-bottom: 2rem;
    }

    .status::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    nav {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    nav a {
      font-size: 0.88rem;
      color: var(--text-dim);
      transition: color 0.15s;
    }

    nav a:hover {
      color: var(--accent);
      text-decoration: none;
    }

    nav a+a::before {
      content: '·';
      margin-right: 1.5rem;
      color: var(--border);
    }
  </style>
</head>

<body>
  <main>
    <h1><span>selector</span>4nix</h1>
    <p>A Nix substituter proxy with parallel cache queries and latency-aware selection.</p>
    <div class="status">Running</div>
    <nav>
      <a href="https://github.com/StarryReverie/selector4nix">GitHub</a>
      <a href="https://github.com/StarryReverie/selector4nix/blob/main/docs/configuration.md">Configuration</a>
      <a href="/substituters/available">Substituters</a>
      <a href="/health">Health</a>
    </nav>
  </main>
</body>

</html>
